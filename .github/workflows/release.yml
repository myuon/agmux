name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            cc: "clang -arch x86_64"
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Build binary
        env:
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc || 'cc' }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -ldflags "-X main.version=${{ github.ref_name }} -X main.commit=$(echo '${{ github.sha }}' | cut -c1-7) -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o agmux-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/agmux

      - uses: actions/upload-artifact@v4
        with:
          name: agmux-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agmux-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          files: artifacts/*
